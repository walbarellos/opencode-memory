<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Palace - Neural Network Visualizer</title>
    
    <!-- Fonts (fallback to system if unavailable) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    
    <style>
        :root {
            --primary: #00f5d4;
            --secondary: #9b5de5;
            --accent-pink: #f15bb5;
            --accent-yellow: #fee440;
            --accent-orange: #ff6b35;
            --accent-red: #ff3366;
            --accent-blue: #00bbf9;
            --accent-green: #00ff87;
            
            --bg-dark: #0a0a0f;
            --bg-darker: #050508;
            --bg-card: rgba(15, 15, 25, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            
            --glow-primary: 0 0 20px rgba(0, 245, 212, 0.5);
            --glow-secondary: 0 0 20px rgba(155, 93, 229, 0.5);
            
            --font-display: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
            --font-body: 'Rajdhani', 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-darker);
            color: var(--text-primary);
            overflow: hidden;
            min-height: 100vh;
        }

        /* Background Effects */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Layout */
        .app-container {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 70px 1fr;
            height: 100vh;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.95) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 245, 212, 0.1);
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: var(--glow-primary);
        }

        .logo-text h1 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px 10px 42px;
            border-radius: 25px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            width: 260px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow-primary);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: var(--glow-primary);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Left Panel */
        .left-panel {
            background: linear-gradient(90deg, rgba(10, 10, 15, 0.98) 0%, transparent 100%);
            padding: 25px 15px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .panel-title {
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.1), transparent);
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-item {
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .category-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--category-color);
        }

        .category-item:hover, .category-item.active {
            background: rgba(var(--category-rgb), 0.1);
            border-color: var(--category-color);
            transform: translateX(5px);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-icon {
            width: 36px;
            height: 36px;
            background: rgba(var(--category-rgb), 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .category-name {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .category-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Canvas */
        .canvas-container {
            position: relative;
            background: radial-gradient(ellipse at center, rgba(0, 245, 212, 0.05) 0%, transparent 70%);
        }

        #network-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Right Panel */
        .right-panel {
            background: linear-gradient(-90deg, rgba(10, 10, 15, 0.98) 0%, transparent 100%);
            padding: 25px 15px;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-card {
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 15px;
        }

        .detail-node-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .detail-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .detail-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .detail-description {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .detail-section-title {
            font-family: var(--font-display);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .connections-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .connection-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .connection-tag:hover {
            background: rgba(0, 245, 212, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: rgba(0, 245, 212, 0.1);
            border: 1px solid rgba(0, 245, 212, 0.3);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            color: var(--primary);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 30px;
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .empty-title {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 180px;
        }

        /* Canvas Controls */
        .canvas-controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            width: 44px;
            height: 44px;
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(0, 245, 212, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Tooltip */
        .node-tooltip {
            position: fixed;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 212, 0.3);
            border-radius: 12px;
            padding: 14px;
            max-width: 260px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .node-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-title {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .tooltip-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Mode Toggle */
        .mode-toggle {
            position: fixed;
            top: 90px;
            right: 25px;
            z-index: 100;
        }

        .toggle-container {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-btn {
            padding: 8px 14px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 22px;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--bg-dark);
        }

        /* Loading */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-darker);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s, visibility 0.6s;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 30px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .loading-bar-container {
            width: 250px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0; margin-left: 0; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0; margin-left: 100%; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-screen" id="loading">
        <div class="loading-logo">🧠</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- Background -->
    <div id="particles-js"></div>
    <div class="grid-bg"></div>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
        <div class="toggle-container">
            <button class="toggle-btn active" data-mode="3d">3D</button>
            <button class="toggle-btn" data-mode="2d">2D</button>
        </div>
    </div>

    <!-- App -->
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🏛️</div>
                <div class="logo-text">
                    <h1>MEMORY PALACE</h1>
                    <p>Neural Visualizer</p>
                </div>
            </div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search" placeholder="Search memories...">
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="node-count">0</div>
                    <div class="stat-label">Nodes</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="link-count">0</div>
                    <div class="stat-label">Links</div>
                </div>
            </div>
        </header>

        <aside class="left-panel">
            <div class="panel-title">Categories</div>
            <div class="category-list" id="category-list"></div>
        </aside>

        <main class="canvas-container">
            <canvas id="network-canvas-3d"></canvas>
            <svg id="network-canvas-2d"></svg>
            
            <div class="canvas-controls">
                <button class="control-btn" id="btn-zoom-in" title="Zoom In">➕</button>

        <aside class="right-panel">
            <div class="panel-title">Node Details</div>
            <div id="detail-panel">
                <div class="empty-state">
                    <div class="empty-icon">🎯</div>
                    <div class="empty-title">Select a Node</div>
                    <div class="empty-text">Click on any node in the network to view details</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Tooltip -->
    <div class="node-tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltip-title">Node</div>
        <div class="tooltip-desc" id="tooltip-desc">Description</div>
    </div>

                { source: "opencode", target: "mempalace" },
                { source: "opencode", target: "hermes" },
                { source: "mempalace", target: "vigilia" },
                { source: "hermes", target: "vigilia" },
                { source: "python", target: "mempalace" }
            ]
        };

        // Three.js 3D
        let scene, camera, renderer, nodes = [], links = [];
        let selectedNode = null;
        let autoRotate = false;

        function init3D() {
            const canvas = document.getElementById('network-canvas-3d');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            camera.position.z = 30;
            
            // Lights
            scene.add(new THREE.AmbientLight(0x404040, 0.5));
            const p1 = new THREE.PointLight(0x00f5d4, 1, 100);
            p1.position.set(10, 10, 10);
            scene.add(p1);
            
            // Create nodes
            const colors = {};
            memoryData.categories.forEach(c => colors[c.id] = c.color);
            
            memoryData.nodes.forEach((node, i) => {
                const color = colors[node.group];
                const geo = new THREE.SphereGeometry(0.7, 32, 32);
                const mat = new THREE.MeshPhongMaterial({ 
                    color, 
                    emissive: color, 
                    emissiveIntensity: 0.3 
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(
                    (Math.random() - 0.5) * 18,
                    (Math.random() - 0.5) * 18,
                    (Math.random() - 0.5) * 18
                );
                mesh.userData = node;
                scene.add(mesh);
                nodes.push(mesh);
            });
            
            // Create links
            memoryData.links.forEach(link => {
                const s = nodes.find(n => n.userData.id === link.source);
                const t = nodes.find(n => n.userData.id === link.target);
                if (s && t) {
                    const geo = new THREE.BufferGeometry().setFromPoints([s.position, t.position]);
                    const mat = new THREE.LineBasicMaterial({ color: 0x00f5d4, transparent: true, opacity: 0.3 });
                    const line = new THREE.Line(geo, mat);
                    scene.add(line);
                    links.push({ line, source: s, target: t });
                }
            });
            
            // Drag
            let isDragging = false, prev = { x: 0, y: 0 };
            canvas.addEventListener('mousedown', e => { isDragging = true; prev = { x: e.clientX, y: e.clientY }; });
            canvas.addEventListener('mousemove', e => {
                if (isDragging) {
                    scene.rotation.y += (e.clientX - prev.x) * 0.005;
                    scene.rotation.x += (e.clientY - prev.y) * 0.005;
                    prev = { x: e.clientX, y: prev.y };
                }
            });
            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('wheel', e => {
                camera.position.z = Math.max(10, Math.min(50, camera.position.z + e.deltaY * 0.01 * camera.position.z));
            });
            
            animate3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            if (autoRotate) scene.rotation.y += 0.002;
            nodes.forEach((n, i) => n.position.y += Math.sin(Date.now() * 0.001 + i) * 0.008);
            renderer.render(scene, camera);
        }

        // D3.js 2D
        function init2D() {
            const svg = d3.select('#network-canvas-2d');
            const w = window.innerWidth - 600;
            const h = window.innerHeight - 70;
            
            svg.attr('width', w).attr('height', h);
            const g = svg.append('g');
            
            svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));
            
            const sim = d3.forceSimulation(memoryData.nodes)
                .force('link', d3.forceLink(memoryData.links).id(d => d.id).distance(120))
                .force('charge', d3.forceManyBody().strength(-350))
                .force('center', d3.forceCenter(w / 2, h / 2))
                .force('collision', d3.forceCollide().radius(45));
            
            const colors = {};
            memoryData.categories.forEach(c => colors[c.id] = c.color);
            
            const linksG = g.append('g').selectAll('line').data(memoryData.links).join('line')
                .attr('stroke', 'rgba(0,245,212,0.3)').attr('stroke-width', 2);
            
            const nodesG = g.append('g').selectAll('g').data(memoryData.nodes).join('g')
                .call(d3.drag().on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));
            
            nodesG.append('circle').attr('r', 18).attr('fill', d => colors[d.group])
                .attr('stroke', '#fff').attr('stroke-width', 2);
            nodesG.append('text').text(d => d.icon).attr('text-anchor', 'middle').attr('dy', '0.35em').attr('font-size', '14px');
            nodesG.append('text').text(d => d.label).attr('text-anchor', 'middle').attr('dy', '35px')
                .attr('fill', '#fff').attr('font-size', '10px').attr('font-family', 'Orbitron, sans-serif');
            
            nodesG.on('click', (e, d) => updateDetailPanel(d));
            
            sim.on('tick', () => {
                linksG.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                nodesG.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

        // UI
        function updateDetailPanel(node) {
            const cat = memoryData.categories.find(c => c.id === node.group);
            const conns = memoryData.links.filter(l => l.source === node.id || l.target === node.id)
                .map(l => l.source === node.id ? l.target : l.source);
            
            document.getElementById('detail-panel').innerHTML = `
                <div class="detail-card">
                    <div class="detail-header">
                        <div class="detail-node-icon">${node.icon}</div>
                        <div>
                            <div class="detail-title">${node.label}</div>
                            <div class="detail-subtitle">${cat?.name || ''}</div>
                        </div>
                    </div>
                    <p class="detail-description">${node.desc}</p>
                    <div class="detail-section-title">Connections</div>
                    <div class="connections-list">
                        ${conns.map(id => {
                            const n = memoryData.nodes.find(x => x.id === id);
                            return n ? `<span class="connection-tag">${n.icon} ${n.label}</span>` : '';
                        }).join('')}
                    </div>
                    <div class="detail-section-title">Tags</div>
                    <div class="tags-list">
                        ${node.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        function populateCategories() {
            const counts = {};
            memoryData.nodes.forEach(n => counts[n.group] = (counts[n.group] || 0) + 1);
            const max = Math.max(...Object.values(counts));
            
            document.getElementById('category-list').innerHTML = memoryData.categories.map(cat => `
                <div class="category-item" data-category="${cat.id}" style="--category-color: ${cat.color}; --category-rgb: ${cat.rgb}">
                    <div class="category-header">
                        <div class="category-icon">${cat.icon}</div>
                        <div>
                            <div class="category-name">${cat.name}</div>
                            <div class="category-count">${counts[cat.id] || 0} nodes</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('node-count').textContent = memoryData.nodes.length;
            document.getElementById('link-count').textContent = memoryData.links.length;
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            particlesJS('particles-js', {
                particles: { number: { value: 60 }, color: { value: '#00f5d4' }, line_linked: { enable: true, distance: 150, color: '#00f5d4', opacity: 0.2 } }
            });
            
            init3D();
            init2D();
            populateCategories();
            
            // Controls
            document.getElementById('btn-auto-rotate').addEventListener('click', e => {
                autoRotate = !autoRotate;
                e.currentTarget.style.background = autoRotate ? 'var(--primary)' : '';
            });
            
            // Mode toggle
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const mode = btn.dataset.mode;
                    document.getElementById('network-canvas-3d').style.display = mode === '3d' ? 'block' : 'none';
                    document.getElementById('network-canvas-2d').style.display = mode === '2d' ? 'block' : 'none';
                });
            });
            
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);
        });
    </script>
</body>
</html>
