<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Palace - Willian's Memories</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            overflow: hidden;
            height: 100vh;
        }
        
        .app {
            display: grid;
            grid-template-columns: 280px 1fr 380px;
            grid-template-rows: 64px 1fr;
            height: 100vh;
        }
        
        /* Header */
        .header {
            grid-column: 1 / -1;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 24px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #00f5d4, #9b5de5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .logo h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .logo-sub {
            font-size: 11px;
            color: #8b949e;
        }
        
        .search {
            flex: 1;
            max-width: 400px;
        }
        
        .search input {
            width: 100%;
            padding: 10px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
        }
        
        .search input:focus {
            outline: none;
            border-color: #00f5d4;
        }
        
        .stats {
            display: flex;
            gap: 28px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #00f5d4;
        }
        
        .stat-label {
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Sidebar */
        .sidebar {
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 20px 16px;
            overflow-y: auto;
        }
        
        .section-title {
            font-size: 10px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 4px;
        }
        
        .theme-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .theme-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--color);
            border-radius: 12px 0 0 12px;
            opacity: 0.7;
        }
        
        .theme-card:hover {
            border-color: var(--color);
            transform: translateX(4px);
        }
        
        .theme-card.active {
            border-color: var(--color);
            background: rgba(255,255,255,0.02);
        }
        
        .theme-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .theme-icon {
            font-size: 22px;
        }
        
        .theme-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .theme-meta {
            font-size: 11px;
            color: #8b949e;
        }
        
        .theme-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .preview-tag {
            font-size: 10px;
            padding: 2px 8px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            color: #8b949e;
        }
        
        /* Main */
        .main {
            position: relative;
            background: radial-gradient(ellipse at center, #1a1f2e 0%, #0d1117 100%);
            overflow: hidden;
        }
        
        #network {
            width: 100%;
            height: 100%;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: #161b22;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        
        .ctrl-btn {
            width: 40px;
            height: 40px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .ctrl-btn:hover {
            background: #1f6feb;
            border-color: #1f6feb;
        }
        
        /* Detail Panel */
        .detail {
            background: #161b22;
            border-left: 1px solid #30363d;
            padding: 20px;
            overflow-y: auto;
        }
        
        .detail-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8b949e;
            text-align: center;
        }
        
        .detail-empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
        }
        
        .detail-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 2px solid var(--color, #00f5d4);
            background: rgba(0,245,212,0.1);
        }
        
        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .detail-subtitle {
            font-size: 12px;
            color: var(--color, #8b949e);
        }
        
        .detail-desc {
            font-size: 14px;
            line-height: 1.7;
            color: #c9d1d9;
            margin-bottom: 20px;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .section-label {
            font-size: 10px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .memory-list {
            list-style: none;
        }
        
        .memory-item {
            padding: 12px 0;
            border-bottom: 1px solid #21262d;
        }
        
        .memory-item:last-child {
            border-bottom: none;
        }
        
        .memory-title {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        
        .memory-content {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .memory-meta {
            font-size: 11px;
            color: #6e7681;
            margin-top: 4px;
        }
        
        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            padding: 4px 10px;
            background: rgba(0,245,212,0.1);
            border: 1px solid rgba(0,245,212,0.2);
            border-radius: 12px;
            font-size: 11px;
            color: #00f5d4;
        }
        
        /* Graph styles */
        .node circle {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .node circle:hover {
            filter: brightness(1.2);
        }
        
        .node text {
            pointer-events: none;
            font-size: 12px;
            fill: #fff;
            text-anchor: middle;
        }
        
        .link {
            stroke: #30363d;
            stroke-opacity: 0.4;
            stroke-width: 2;
        }
        
        /* Tooltip */
        .tooltip {
            position: fixed;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1000;
            max-width: 300px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .tooltip.show { opacity: 1; }
        
        .tooltip-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tooltip-desc {
            color: #8b949e;
            font-size: 12px;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🏛️</div>
                <div>
                    <h1>MEMORY PALACE</h1>
                    <div class="logo-sub">Willian's Neural Network</div>
                </div>
            </div>
            <div class="search">
                <input type="text" id="search" placeholder="Buscar memórias...">
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="theme-count">0</div>
                    <div class="stat-label">Temas</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="memory-count">0</div>
                    <div class="stat-label">Memórias</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="drawer-count">0</div>
                    <div class="stat-label">Drawers</div>
                </div>
            </div>
        </header>
        
        <aside class="sidebar">
            <div class="section-title">Temas</div>
            <div id="themes"></div>
        </aside>
        
        <main class="main">
            <svg id="network"></svg>
            <div class="controls">
                <button class="ctrl-btn" onclick="zoomIn()">➕</button>
                <button class="ctrl-btn" onclick="zoomOut()">➖</button>
                <button class="ctrl-btn" onclick="resetZoom()">🔄</button>
            </div>
        </main>
        
        <aside class="detail" id="detail">
            <div class="detail-empty" id="detail-empty">
                <div class="detail-empty-icon">🧠</div>
                <div>Selecione um tema para ver as memórias</div>
            </div>
        </aside>
    </div>
    
    <div class="tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltip-title"></div>
        <div class="tooltip-desc" id="tooltip-desc"></div>
    </div>

    <script>
        // Load memory data
        let memoryData = null;
        
        async function loadMemories() {
            try {
                const response = await fetch('memories.json');
                memoryData = await response.json();
                init();
            } catch (e) {
                console.error('Failed to load memories:', e);
                // Fallback inline data
                memoryData = getInlineData();
                init();
            }
        }
        
        function getInlineData() {
            return {
                profile: { name: "Willian", alias: "Walbarellos", age: 30 },
                themes: [
                    {
                        id: "identity", name: "Identidade", icon: "👤", color: "#00ff87",
                        description: "Perfil pessoal e profissional",
                        memories: [
                            { title: "Nome", content: "Willian", meta: "Nome completo" },
                            { title: "Apelido", content: "Walbarellos", meta: "Username Linux" },
                            { title: "Idade", content: "30 anos", meta: "Nascido em 1996" },
                            { title: "Origem", content: "🇧🇷 Brasil", meta: "País de origem" }
                        ]
                    },
                    {
                        id: "languages", name: "Idiomas", icon: "💬", color: "#00bbf9",
                        description: "Idiomas falados",
                        memories: [
                            { title: "Nativo", content: "🇧🇷 Português (BR)", meta: "Língua nativa" },
                            { title: "Fluente", content: "🇺🇸 English (US)", meta: "Profissional" },
                            { title: "Fluente", content: "🇪🇸 Español", meta: "Conversação" },
                            { title: "Interesse", content: "✡️ עברית (Hebrew)", meta: "Cultura judaica" }
                        ]
                    },
                    {
                        id: "interests", name: "Interesses", icon: "❤️", color: "#c084fc",
                        description: "Áreas de interesse pessoal",
                        memories: [
                            { title: "Carreira", content: "💻 Engenharia de Software", meta: "Paixão e profissão" },
                            { title: "Cultura", content: "🎌 Anime & Mangá", meta: "Entretenimento" },
                            { title: "Hobby", content: "🎮 Video Games", meta: "Gamer" },
                            { title: "Finanças", content: "₿ Criptomoedas", meta: "Blockchain" },
                            { title: "Cultura", content: "🇮🇱 Israel", meta: "Startup Nation" },
                            { title: "Religião", content: "✡️ Judaísmo", meta: "Tradição" }
                        ]
                    },
                    {
                        id: "tech", name: "Tecnologias", icon: "⚙️", color: "#fb923c",
                        description: "Stack tecnológico",
                        memories: [
                            { title: "Sistema", content: "🐧 Arch Linux", meta: "OS principal" },
                            { title: "Linguagem", content: "🐍 Python", meta: "Scripting & AI" },
                            { title: "Backend", content: "🔷 Supabase", meta: "BaaS" },
                            { title: "IA", content: "⚡ OpenCode", meta: "Coding Assistant" },
                            { title: "Memória", content: "🏛️ MemPalace", meta: "AI Memory" },
                            { title: "Agente", content: "🤖 Hermes", meta: "AI Agent" }
                        ]
                    },
                    {
                        id: "projects", name: "Projetos", icon: "🚀", color: "#f472b6",
                        description: "Projetos em desenvolvimento",
                        memories: [
                            { title: "Vigília", content: "Marketplace para acompanhantes hospitalares", meta: "Projeto principal" },
                            { title: "Supabase", content: "Backend as a Service", meta: "PostgreSQL, Auth, Realtime" }
                        ]
                    }
                ],
                palace_stats: { total_drawers: 665 }
            };
        }
        
        function init() {
            // Update stats
            document.getElementById('theme-count').textContent = memoryData.themes.length;
            const totalMemories = memoryData.themes.reduce((acc, t) => acc + (t.memories?.length || 0), 0);
            document.getElementById('memory-count').textContent = totalMemories;
            document.getElementById('drawer-count').textContent = memoryData.palace_stats?.total_drawers || '665';
            
            // Create theme cards
            const themesEl = document.getElementById('themes');
            memoryData.themes.forEach(theme => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.style.setProperty('--color', theme.color);
                card.dataset.theme = theme.id;
                
                const previewItems = (theme.memories || []).slice(0, 3);
                card.innerHTML = `
                    <div class="theme-header">
                        <span class="theme-icon">${theme.icon}</span>
                        <div>
                            <div class="theme-name">${theme.name}</div>
                            <div class="theme-meta">${previewItems.length} memórias</div>
                        </div>
                    </div>
                    <div class="theme-preview">
                        ${previewItems.map(m => `<span class="preview-tag">${m.content}</span>`).join('')}
                    </div>
                `;
                
                card.addEventListener('click', () => showTheme(theme));
                themesEl.appendChild(card);
            });
            
            // Initialize graph
            initGraph();
        }
        
        // D3 Network Graph
        function initGraph() {
            const container = document.querySelector('.main');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const svg = d3.select('#network')
                .attr('width', width)
                .attr('height', height);
            
            const g = svg.append('g');
            
            const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform));
            svg.call(zoom);
            
            // Create nodes
            const nodes = memoryData.themes.map((theme, i) => ({
                id: theme.id,
                label: theme.name,
                icon: theme.icon,
                color: theme.color,
                theme: theme,
                x: width / 2 + (i - 2) * 220,
                y: height / 2
            }));
            
            // Create sub-nodes (memories)
            const subNodes = [];
            memoryData.themes.forEach(theme => {
                const baseX = nodes.find(n => n.id === theme.id)?.x || width / 2;
                const baseY = nodes.find(n => n.id === theme.id)?.y || height / 2;
                
                (theme.memories || []).forEach((mem, i) => {
                    const angle = (i / (theme.memories || []).length) * 2 * Math.PI - Math.PI / 2;
                    const radius = 130;
                    subNodes.push({
                        id: `${theme.id}-${i}`,
                        label: mem.content,
                        parent: theme.id,
                        color: theme.color,
                        x: baseX + Math.cos(angle) * radius,
                        y: baseY + Math.sin(angle) * radius
                    });
                });
            });
            
            // Links
            const links = subNodes.map(n => ({ source: n.parent, target: n.id }));
            
            const link = g.append('g').selectAll('line').data(links).join('line')
                .attr('class', 'link');
            
            const node = g.append('g').selectAll('g').data(nodes).join('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));
            
            node.append('circle').attr('r', 40).attr('fill', d => d.color)
                .attr('stroke', '#fff').attr('stroke-width', 3);
            node.append('text').text(d => d.icon).attr('dy', '0.35em').attr('font-size', '24px');
            node.append('text').text(d => d.label).attr('dy', 55).attr('font-size', '12px').attr('font-weight', '600');
            
            // Sub-nodes
            const sub = g.append('g').selectAll('g').data(subNodes).join('g')
                .attr('class', 'node');
            
            sub.append('circle').attr('r', 18).attr('fill', d => d.color + '40').attr('stroke', d => d.color).attr('stroke-width', 2);
            sub.append('text').text(d => d.label.length > 12 ? d.label.substring(0, 12) + '..' : d.label)
                .attr('dy', 30).attr('font-size', '9px').attr('fill', '#8b949e');
            
            // Interactions
            node.on('click', (e, d) => showTheme(d.theme));
            node.on('mouseenter', (e, d) => showTooltip(e, `${d.icon} ${d.label}`, d.theme.description));
            node.on('mouseleave', hideTooltip);
            
            sub.on('click', (e, d) => {
                const theme = memoryData.themes.find(t => t.id === d.parent);
                showTheme(theme);
            });
            
            const sim = d3.forceSimulation([...nodes, ...subNodes])
                .force('link', d3.forceLink(links).id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-250))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(50));
            
            sim.on('tick', () => {
                link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                node.attr('transform', d => `translate(${d.x},${d.y})`);
                sub.attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            // Click outside
            svg.on('click', () => {
                resetHighlight();
                document.getElementById('detail').innerHTML = `
                    <div class="detail-empty">
                        <div class="detail-empty-icon">🧠</div>
                        <div>Selecione um tema para ver as memórias</div>
                    </div>
                `;
            });
            
            // Initial zoom
            svg.call(zoom.transform, d3.zoomIdentity.translate(width/4, height/4).scale(0.9));
        }
        
        function showTheme(theme) {
            // Update sidebar
            document.querySelectorAll('.theme-card').forEach(c => {
                c.classList.toggle('active', c.dataset.theme === theme.id);
            });
            
            // Show detail
            const detail = document.getElementById('detail');
            const memList = (theme.memories || []).map(m => `
                <li class="memory-item">
                    <div class="memory-title">${m.title}</div>
                    <div class="memory-content">${m.content}</div>
                    ${m.meta ? `<div class="memory-meta">${m.meta}</div>` : ''}
                    ${m.details ? Object.entries(m.details).map(([k,v]) => `<div class="memory-meta">${k}: ${v}</div>`).join('') : ''}
                </li>
            `).join('');
            
            detail.innerHTML = `
                <div style="--color: ${theme.color}">
                    <div class="detail-header">
                        <div class="detail-icon">${theme.icon}</div>
                        <div>
                            <div class="detail-title">${theme.name}</div>
                            <div class="detail-subtitle">${theme.description}</div>
                        </div>
                    </div>
                    
                    <div class="detail-desc">${theme.description || 'Clique em um tema para ver as memórias.'}</div>
                    
                    ${theme.memories?.length ? `
                    <div class="detail-section">
                        <div class="section-label">Memórias (${theme.memories.length})</div>
                        <ul class="memory-list">
                            ${memList}
                        </ul>
                    </div>
                    ` : ''}
                    
                    <div class="detail-section">
                        <div class="section-label">Tags</div>
                        <div class="detail-tags">
                            <span class="tag">#${theme.id}</span>
                            <span class="tag">#${memoryData.profile.alias}</span>
                        </div>
                    </div>
                </div>
            `;
            
            highlightTheme(theme.id);
        }
        
        function highlightTheme(themeId) {
            d3.selectAll('.node circle').style('opacity', d => 
                d.theme?.id === themeId ? 1 : 0.3
            );
            d3.selectAll('.link').style('opacity', d =>
                d.source === themeId ? 0.8 : 0.1
            );
        }
        
        function resetHighlight() {
            d3.selectAll('.node circle').style('opacity', 1);
            d3.selectAll('.link').style('opacity', 0.4);
            document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
        }
        
        function showTooltip(e, title, desc) {
            document.getElementById('tooltip-title').textContent = title;
            document.getElementById('tooltip-desc').textContent = desc;
            const tt = document.getElementById('tooltip');
            tt.style.left = (e.pageX + 15) + 'px';
            tt.style.top = (e.pageY - 15) + 'px';
            tt.classList.add('show');
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('show');
        }
        
        function zoomIn() { d3.select('#network').transition().duration(300).call(d3.zoom().scaleBy, 1.3); }
        function zoomOut() { d3.select('#network').transition().duration(300).call(d3.zoom().scaleBy, 0.7); }
        function resetZoom() { 
            const w = document.querySelector('.main').clientWidth;
            const h = document.querySelector('.main').clientHeight;
            d3.select('#network').transition().duration(500)
                .call(d3.zoom().transform, d3.zoomIdentity.translate(w/4, h/4).scale(0.9));
            resetHighlight();
        }
        
        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if (!q) { resetHighlight(); return; }
            
            const match = memoryData.themes.find(t => 
                t.name.toLowerCase().includes(q) ||
                (t.memories || []).some(m => m.content.toLowerCase().includes(q))
            );
            if (match) highlightTheme(match.id);
        });
        
        // Start
        loadMemories();
    </script>
</body>
</html>
