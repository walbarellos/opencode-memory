<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Palace - Willian's Neural Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            overflow: hidden;
            height: 100vh;
        }
        
        .app {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }
        
        /* Header */
        .header {
            grid-column: 1 / -1;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            font-size: 24px;
        }
        
        .logo h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f5d4, #9b5de5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-box {
            flex: 1;
            max-width: 400px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #00f5d4;
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #00f5d4;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
        }
        
        /* Left Panel - Categories */
        .sidebar {
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 20px;
            overflow-y: auto;
        }
        
        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        .category {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category:hover, .category.active {
            border-color: var(--color);
            background: rgba(255,255,255,0.03);
        }
        
        .category-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--color);
        }
        
        .category-info {
            flex: 1;
        }
        
        .category-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .category-count {
            font-size: 12px;
            color: #8b949e;
        }
        
        /* Main Canvas */
        .main {
            position: relative;
            background: radial-gradient(ellipse at center, #1a1f2e 0%, #0d1117 100%);
        }
        
        #graph {
            width: 100%;
            height: 100%;
        }
        
        .node circle {
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .node circle:hover {
            filter: brightness(1.3);
        }
        
        .node text {
            font-size: 11px;
            fill: #e6edf3;
            pointer-events: none;
            text-anchor: middle;
        }
        
        .link {
            stroke: #30363d;
            stroke-opacity: 0.6;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: #161b22;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: #1f6feb;
            border-color: #1f6feb;
        }
        
        /* Right Panel - Details */
        .detail-panel {
            background: #161b22;
            border-left: 1px solid #30363d;
            padding: 20px;
            overflow-y: auto;
        }
        
        .detail-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8b949e;
            text-align: center;
        }
        
        .detail-empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .detail-card {
            display: none;
        }
        
        .detail-card.show {
            display: block;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .detail-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, #00f5d4, #9b5de5);
        }
        
        .detail-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .detail-category {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-section-title {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .detail-description {
            font-size: 14px;
            line-height: 1.6;
            color: #c9d1d9;
        }
        
        .connections {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .connection-tag {
            padding: 6px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .connection-tag:hover {
            border-color: #00f5d4;
            color: #00f5d4;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            padding: 4px 10px;
            background: rgba(0, 245, 212, 0.1);
            border: 1px solid rgba(0, 245, 212, 0.3);
            border-radius: 12px;
            font-size: 11px;
            font-family: monospace;
            color: #00f5d4;
        }
        
        /* Tooltip */
        .tooltip {
            position: fixed;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            max-width: 250px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .tooltip.show {
            opacity: 1;
        }
        
        .tooltip-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tooltip-desc {
            color: #8b949e;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <h1>MEMORY PALACE</h1>
            </div>
            <div class="search-box">
                <input type="text" id="search" placeholder="Buscar memórias...">
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="node-count">0</div>
                    <div class="stat-label">Nós</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="link-count">0</div>
                    <div class="stat-label">Conexões</div>
                </div>
            </div>
        </header>
        
        <aside class="sidebar">
            <div class="sidebar-title">Categorias</div>
            <div id="categories"></div>
        </aside>
        
        <main class="main">
            <svg id="graph"></svg>
            <div class="controls">
                <button class="control-btn" onclick="zoomIn()" title="Zoom +">➕</button>
                <button class="control-btn" onclick="zoomOut()" title="Zoom -">➖</button>
                <button class="control-btn" onclick="resetZoom()" title="Reset">🔄</button>
                <button class="control-btn" onclick="toggleLabels()" title="Toggle Labels">🏷️</button>
            </div>
        </main>
        
        <aside class="detail-panel">
            <div class="sidebar-title">Detalhes</div>
            <div class="detail-empty" id="detail-empty">
                <div class="detail-empty-icon">👆</div>
                <div>Clique em um nó para ver detalhes</div>
            </div>
            <div class="detail-card" id="detail-card">
                <div class="detail-header">
                    <div class="detail-icon" id="detail-icon">💡</div>
                    <div>
                        <div class="detail-title" id="detail-title">Nome</div>
                        <div class="detail-category" id="detail-category">Categoria</div>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Descrição</div>
                    <div class="detail-description" id="detail-desc">Descrição...</div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Conexões</div>
                    <div class="connections" id="detail-connections"></div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Tags</div>
                    <div class="tags" id="detail-tags"></div>
                </div>
            </div>
        </aside>
    </div>
    
    <div class="tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltip-title"></div>
        <div class="tooltip-desc" id="tooltip-desc"></div>
    </div>

    <script>
        // Memory Data
        const data = {
            categories: [
                { id: 'identity', name: 'Identidade', icon: '👤', color: '#00ff87' },
                { id: 'language', name: 'Idiomas', icon: '💬', color: '#00bbf9' },
                { id: 'interest', name: 'Interesses', icon: '❤️', color: '#c084fc' },
                { id: 'tech', name: 'Tecnologias', icon: '⚙️', color: '#fb923c' }
            ],
            nodes: [
                { id: 'willian', label: 'Willian', group: 'identity', icon: '👤', 
                  desc: 'Desenvolvedor brasileiro, 30 anos, apaixonado por tecnologia.' },
                { id: 'brazil', label: '🇧🇷 Brasil', group: 'identity', icon: '🌎', 
                  desc: 'País de origem. Maior país da América do Sul.' },
                { id: 'age', label: '30 Anos', group: 'identity', icon: '🎂', 
                  desc: '30 anos, nascido em 1996.' },
                
                { id: 'pt-br', label: 'Português', group: 'language', icon: '🇧🇷', 
                  desc: 'Idioma nativo do Brasil.' },
                { id: 'en-us', label: 'English', group: 'language', icon: '🇺🇸', 
                  desc: 'Inglês americano fluente.' },
                { id: 'hebrew', label: 'עברית', group: 'language', icon: '✡️', 
                  desc: 'Hebraico - interesse ligado a Israel e Judaísmo.' },
                { id: 'es', label: 'Español', group: 'language', icon: '🇪🇸', 
                  desc: 'Espanhol fluente.' },
                
                { id: 'software-eng', label: 'Software Eng.', group: 'interest', icon: '💻', 
                  desc: 'Engenharia de software - paixão e carreira.' },
                { id: 'anime', label: 'Anime', group: 'interest', icon: '📺', 
                  desc: 'Cultura anime japonesa.' },
                { id: 'manga', label: 'Manga', group: 'interest', icon: '📚', 
                  desc: 'Leitura de mangás.' },
                { id: 'games', label: 'Games', group: 'interest', icon: '🎮', 
                  desc: 'Jogos eletrônicos.' },
                { id: 'crypto', label: '₿ Crypto', group: 'interest', icon: '📈', 
                  desc: 'Criptomoedas e blockchain.' },
                { id: 'israel', label: '🇮🇱 Israel', group: 'interest', icon: '🕎', 
                  desc: 'Interesse profundo na cultura israelense.' },
                { id: 'judaism', label: '✡️ Judaísmo', group: 'interest', icon: '📿', 
                  desc: 'Praticando ou estudando Judaísmo.' },
                
                { id: 'arch', label: 'Arch Linux', group: 'tech', icon: '🐧', 
                  desc: 'Sistema operacional principal.' },
                { id: 'opencode', label: 'OpenCode', group: 'tech', icon: '⚡', 
                  desc: 'Assistente de IA para código.' },
                { id: 'mempalace', label: 'MemPalace', group: 'tech', icon: '🏛️', 
                  desc: 'Gerenciamento de memória para IA.' },
                { id: 'hermes', label: 'Hermes', group: 'tech', icon: '🤖', 
                  desc: 'Agente de IA.' },
                { id: 'vigilia', label: 'Vigilia', group: 'tech', icon: '🔮', 
                  desc: 'Ambiente de desenvolvimento.' },
                { id: 'cli', label: 'CLI', group: 'tech', icon: '⌨️', 
                  desc: 'Expert em linha de comando.' },
                { id: 'python', label: 'Python', group: 'tech', icon: '🐍', 
                  desc: 'Linguagem principal.' }
            ],
            links: [
                { source: 'willian', target: 'brazil' },
                { source: 'willian', target: 'age' },
                { source: 'willian', target: 'pt-br' },
                { source: 'willian', target: 'en-us' },
                { source: 'willian', target: 'hebrew' },
                { source: 'willian', target: 'es' },
                { source: 'willian', target: 'software-eng' },
                { source: 'willian', target: 'arch' },
                { source: 'pt-br', target: 'brazil' },
                { source: 'hebrew', target: 'israel' },
                { source: 'hebrew', target: 'judaism' },
                { source: 'software-eng', target: 'python' },
                { source: 'software-eng', target: 'cli' },
                { source: 'software-eng', target: 'opencode' },
                { source: 'anime', target: 'manga' },
                { source: 'games', target: 'software-eng' },
                { source: 'crypto', target: 'software-eng' },
                { source: 'israel', target: 'judaism' },
                { source: 'arch', target: 'cli' },
                { source: 'opencode', target: 'mempalace' },
                { source: 'opencode', target: 'hermes' },
                { source: 'mempalace', target: 'vigilia' },
                { source: 'hermes', target: 'vigilia' },
                { source: 'python', target: 'mempalace' }
            ]
        };
        
        // Initialize categories sidebar
        const categoryCounts = {};
        data.nodes.forEach(n => categoryCounts[n.group] = (categoryCounts[n.group] || 0) + 1);
        
        const categoriesEl = document.getElementById('categories');
        data.categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category';
            div.dataset.category = cat.id;
            div.style.setProperty('--color', cat.color);
            div.innerHTML = `
                <div class="category-icon">${cat.icon}</div>
                <div class="category-info">
                    <div class="category-name">${cat.name}</div>
                    <div class="category-count">${categoryCounts[cat.id] || 0} nós</div>
                </div>
            `;
            div.addEventListener('click', () => filterByCategory(cat.id));
            categoriesEl.appendChild(div);
        });
        
        // Stats
        document.getElementById('node-count').textContent = data.nodes.length;
        document.getElementById('link-count').textContent = data.links.length;
        
        // D3 Graph
        const width = document.querySelector('.main').clientWidth;
        const height = document.querySelector('.main').clientHeight;
        
        const svg = d3.select('#graph')
            .attr('width', width)
            .attr('height', height);
        
        const g = svg.append('g');
        
        // Zoom
        const zoom = d3.zoom()
            .scaleExtent([0.2, 4])
            .on('zoom', (e) => g.attr('transform', e.transform));
        
        svg.call(zoom);
        
        // Simulation
        const simulation = d3.forceSimulation(data.nodes)
            .force('link', d3.forceLink(data.links).id(d => d.id).distance(100))
            .force('charge', d3.forceManyBody().strength(-300))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(50));
        
        // Links
        const link = g.append('g')
            .selectAll('line')
            .data(data.links)
            .join('line')
            .attr('class', 'link')
            .attr('stroke-width', 2);
        
        // Nodes
        const node = g.append('g')
            .selectAll('g')
            .data(data.nodes)
            .join('g')
            .attr('class', 'node')
            .call(d3.drag()
                .on('start', dragStarted)
                .on('drag', dragged)
                .on('end', dragEnded));
        
        // Node circles
        node.append('circle')
            .attr('r', 20)
            .attr('fill', d => data.categories.find(c => c.id === d.group)?.color || '#fff')
            .attr('stroke', '#fff')
            .attr('stroke-width', 2);
        
        // Node icons
        node.append('text')
            .text(d => d.icon)
            .attr('text-anchor', 'middle')
            .attr('dy', '0.35em')
            .attr('font-size', '14px');
        
        // Node labels
        node.append('text')
            .text(d => d.label)
            .attr('dy', 35)
            .attr('font-size', '11px')
            .attr('fill', '#e6edf3')
            .attr('text-anchor', 'middle');
        
        // Click handler
        node.on('click', (event, d) => {
            event.stopPropagation();
            showDetail(d);
            highlightConnections(d);
        });
        
        // Hover handlers
        node.on('mouseenter', (event, d) => showTooltip(event, d))
              .on('mouseleave', hideTooltip);
        
        // Click outside to deselect
        svg.on('click', () => {
            hideDetail();
            resetHighlight();
        });
        
        // Tick
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
        
        // Functions
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        function showDetail(d) {
            const cat = data.categories.find(c => c.id === d.group);
            const connections = data.links
                .filter(l => l.source.id === d.id || l.target === d.id)
                .map(l => l.source.id === d.id ? l.target : l.source);
            
            document.getElementById('detail-empty').style.display = 'none';
            document.getElementById('detail-card').classList.add('show');
            
            document.getElementById('detail-icon').textContent = d.icon;
            document.getElementById('detail-title').textContent = d.label;
            document.getElementById('detail-category').textContent = cat?.name || '';
            document.getElementById('detail-category').style.color = cat?.color || '';
            document.getElementById('detail-desc').textContent = d.desc;
            
            const connEl = document.getElementById('detail-connections');
            connEl.innerHTML = connections.map(id => {
                const n = data.nodes.find(x => x.id === (typeof id === 'object' ? id.id : id));
                return n ? `<span class="connection-tag" onclick="showDetail(data.nodes.find(x=>x.id==='${n.id}'))">${n.icon} ${n.label}</span>` : '';
            }).join('');
            
            const tagsEl = document.getElementById('detail-tags');
            tagsEl.innerHTML = `<span class="tag">#${d.group}</span><span class="tag">#${d.id}</span>`;
        }
        
        function hideDetail() {
            document.getElementById('detail-empty').style.display = 'flex';
            document.getElementById('detail-card').classList.remove('show');
        }
        
        function highlightConnections(d) {
            const connectedIds = data.links
                .filter(l => l.source.id === d.id || l.target === d.id)
                .flatMap(l => [l.source.id, l.target.id]);
            
            node.style('opacity', n => 
                n.id === d.id || connectedIds.includes(n.id) ? 1 : 0.2
            );
            link.style('opacity', l =>
                l.source.id === d.id || l.target.id === d.id ? 1 : 0.1
            );
        }
        
        function resetHighlight() {
            node.style('opacity', 1);
            link.style('opacity', 0.6);
        }
        
        function showTooltip(event, d) {
            document.getElementById('tooltip-title').textContent = d.icon + ' ' + d.label;
            document.getElementById('tooltip-desc').textContent = d.desc;
            const tooltip = document.getElementById('tooltip');
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY - 15) + 'px';
            tooltip.classList.add('show');
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('show');
        }
        
        function filterByCategory(catId) {
            document.querySelectorAll('.category').forEach(el => {
                el.classList.toggle('active', el.dataset.category === catId);
            });
            
            node.style('opacity', d => catId === 'all' || d.group === catId ? 1 : 0.1);
            link.style('opacity', d => 
                catId === 'all' || d.source.group === catId || d.target.group === catId ? 0.6 : 0.05
            );
        }
        
        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            node.style('opacity', d =>
                !query || d.label.toLowerCase().includes(query) || d.desc.toLowerCase().includes(query) ? 1 : 0.1
            );
        });
        
        // Controls
        function zoomIn() {
            svg.transition().duration(300).call(zoom.scaleBy, 1.3);
        }
        
        function zoomOut() {
            svg.transition().duration(300).call(zoom.scaleBy, 0.7);
        }
        
        function resetZoom() {
            svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
        }
        
        let showLabels = true;
        function toggleLabels() {
            showLabels = !showLabels;
            node.selectAll('text:nth-child(3)').style('opacity', showLabels ? 1 : 0);
        }
        
        // Center view
        svg.call(zoom.transform, d3.zoomIdentity.translate(width/4, height/4).scale(0.9));
    </script>
</body>
</html>
